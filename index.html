<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天堂经典 · 阿登/阿德纳 三平台行情看板</title>
<style>
  :root{--bg:#0f1115;--card:#1a1d24;--line:#2a2f3a;--txt:#e6e8ec;--mut:#8b93a1;--accent:#ffb020;--green:#35c46a;--red:#ff5d5d;--blue:#4ea1ff;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","Microsoft YaHei",sans-serif;font-size:14px;}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 16px 60px;}
  h1{font-size:22px;margin:0 0 4px;}
  .sub{color:var(--mut);font-size:13px;margin-bottom:18px;}
  .sub b{color:var(--accent);}
  .controls{display:flex;flex-wrap:wrap;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:18px;}
  .ctl{display:flex;flex-direction:column;gap:4px;}
  .ctl label{font-size:11px;color:var(--mut);}
  .ctl input{width:110px;background:#0f1115;border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:7px 9px;font-size:14px;}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--mut);margin-bottom:10px;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;}
  table{border-collapse:collapse;width:100%;min-width:920px;}
  th,td{padding:9px 10px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap;}
  th{background:#161922;color:var(--mut);font-weight:600;font-size:12px;position:sticky;top:0;cursor:pointer;user-select:none;}
  th:first-child,td:first-child{text-align:center;}
  td.srv{text-align:left;font-weight:600;}
  tr:hover td{background:#1f232c;}
  .best{color:var(--green);font-weight:700;}
  .tag{font-size:10px;color:#0f1115;background:var(--accent);border-radius:5px;padding:1px 5px;margin-left:5px;vertical-align:middle;}
  .tag.m{background:#ffb020;}.tag.b{background:#4ea1ff;}.tag.t{background:#35c46a;}
  .muted{color:var(--mut);}
  .profit{color:var(--green);}
  .cap{color:var(--accent);font-weight:600;}
  .foot{margin-top:14px;color:var(--mut);font-size:12px;line-height:1.7;}
  .na{color:#555;}
</style>
</head>
<body>
<div class="wrap">
  <h1>天堂经典 · 阿登/阿德纳 三平台行情看板</h1>
  <div class="sub">数据时点 <b id="scraped"></b> · 按服务器分组取各平台最低卖价 · 仅供比价参考,不构成挂单/下单</div>

  <div class="controls">
    <div class="ctl"><label>利润率 %</label><input id="in-profit" type="number" step="0.5" value="10"></div>
    <div class="ctl"><label>平台费 %</label><input id="in-fee" type="number" step="0.5" value="5"></div>
    <div class="ctl"><label>汇率 (KRW→CNY)</label><input id="in-rate" type="number" step="0.0001" value="0.0046"></div>
  </div>

  <div class="legend">
    <span><i class="dot" style="background:#ffb020"></i>itemmania</span>
    <span><i class="dot" style="background:#4ea1ff"></i>itembay</span>
    <span><i class="dot" style="background:#35c46a"></i>barotem</span>
    <span class="muted">价格单位:韩元/万阿德纳 · 收购上限单位:人民币/万</span>
  </div>

  <div class="tbl-wrap">
    <table id="board">
      <thead><tr>
        <th data-k="rank">#</th>
        <th data-k="srv" style="text-align:left">服务器</th>
        <th data-k="m">itemmania</th>
        <th data-k="b">itembay</th>
        <th data-k="t">barotem</th>
        <th data-k="min">全站最低</th>
        <th data-k="med">中位价</th>
        <th data-k="n">样本数</th>
        <th data-k="cap">收购上限(元/万)</th>
        <th data-k="pf">利润(韩元/万)</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <div class="foot" id="foot"></div>
</div>

<script>
/* ===== 数据常量(每次刷新仅替换以下 5 项) ===== */
const SCRAPED = "2026-06-19 18:30 (KST)";
const RATE_DEFAULT = 0.0046;
const MANIA = [["아인하사드",621,720,730,32],["로엔그린",670,720,750,13],["아스테어",700,700,720,7],["마프르",800,880,900,3],["캐스톨",800,910,910,2],["아툰",800,840,860,3],["듀크데필",810,880,880,2],["어레인",880,1030,1380,3],["발센",880,940,970,4],["케레니스",880,910,1050,5],["데컨",880,900,2000,4],["파아그리오",890,930,1300,3],["가드리아",900,990,1280,3],["에바",940,1010,1020,4],["하이네",950,1010,1010,4],["린델",950,1000,1020,4],["세바스챤",960,960,960,1],["크리스터",980,980,1050,3],["사이하",980,1380,1380,2],["하딘",1020,1050,1350,5],["켄라우헬",1020,1180,1180,2],["군터",1040,1060,1070,3],["오웬",1050,1080,1170,5],["이실로테",1170,1300,1600,4],["조우",1180,1230,1330,4],["질리언",1420,1790,1790,2],["발라카스",1430,1542,4530,4],["데포로쥬",1540,1540,1640,3],["오렌",2690,2790,2790,2]];
const IBAY = [["아인하사드",720,730,750,10],["로엔그린",730,750,1020,12],["아스테어",750,760,1180,9],["캐스톨",800,840,950,13],["아툰",810,850,860,10],["듀크데필",810,830,880,12],["마프르",820,870,880,10],["데컨",820,870,900,10],["발센",880,910,990,12],["어레인",880,1010,1110,12],["케레니스",880,920,940,11],["가드리아",900,930,1250,15],["파아그리오",910,930,940,11],["에바",940,980,1020,14],["세바스챤",950,970,990,9],["사이하",970,990,1020,10],["크리스터",980,1040,1070,12],["린델",1000,1000,1020,13],["하이네",1000,1010,1390,13],["하딘",1010,1030,1060,9],["켄라우헬",1020,1110,1200,12],["군터",1050,1070,1090,11],["오웬",1080,1100,1690,13],["조우",1143,1190,1800,14],["이실로테",1180,1240,1320,11],["발라카스",1410,1430,1500,10],["질리언",1420,1500,1600,8],["데포로쥬",1520,1650,2900,14],["오렌",2690,2730,2800,8]];
const BARO = [["아인하사드",668,720,800,20],["로엔그린",680,750,1000,9],["아스테어",720,730,820,7],["데컨",790,820,870,9],["아툰",800,812,850,10],["듀크데필",801,820,870,13],["마프르",840,869,900,10],["캐스톨",840,870,930,12],["발센",849,900,990,12],["케레니스",870,900,1018,12],["가드리아",879,900,2490,13],["세바스챤",900,920,990,10],["에바",901,960,1000,11],["하딘",910,1000,1060,11],["파아그리오",910,920,930,8],["사이하",910,960,1010,13],["어레인",934,1000,1090,11],["린델",940,992,1030,16],["하이네",940,1020,1090,18],["크리스터",968,1010,1060,12],["군터",999,1050,1120,9],["켄라우헬",1090,1100,1500,11],["오웬",1100,1130,1150,14],["조우",1150,1220,1330,16],["이실로테",1180,1240,1500,15],["질리언",1290,1400,1600,11],["발라카스",1390,1400,1500,11],["데포로쥬",1500,1580,1700,13],["오렌",2638,2740,2800,10]];
/* ===== 数据常量结束 ===== */

const fmt = n => n==null?"—":n.toLocaleString();
function toMap(arr){const m={};arr.forEach(r=>m[r[0]]=r);return m;}
const mM=toMap(MANIA), bM=toMap(IBAY), tM=toMap(BARO);
const servers=[...new Set([...MANIA,...IBAY,...BARO].map(r=>r[0]))];
let sortKey="min", sortDir=1;

function rowData(s){
  const m=mM[s], b=bM[s], t=tM[s];
  const mp=m?m[1]:null, bp=b?b[1]:null, tp=t?t[1]:null;
  const cands=[["m",mp],["b",bp],["t",tp]].filter(x=>x[1]!=null);
  cands.sort((a,c)=>a[1]-c[1]);
  const best=cands[0]||[null,null];
  const mins=cands.map(x=>x[1]).sort((a,c)=>a-c);
  const med=mins.length?mins[Math.floor(mins.length/2)]:null;
  const n=(m?m[4]:0)+(b?b[4]:0)+(t?t[4]:0);
  return {srv:s,mp,bp,tp,min:best[1],plat:best[0],med,n};
}
let DATA=servers.map(rowData);

function render(){
  const profit=parseFloat(document.getElementById('in-profit').value)/100||0;
  const fee=parseFloat(document.getElementById('in-fee').value)/100||0;
  const rate=parseFloat(document.getElementById('in-rate').value)||RATE_DEFAULT;
  const tagName={m:"itemmania",b:"itembay",t:"barotem"};
  let d=[...DATA];
  d.sort((a,c)=>{
    let av=a[sortKey], cv=c[sortKey];
    if(sortKey==="srv"){return a.srv.localeCompare(c.srv)*sortDir;}
    if(av==null)av=Infinity; if(cv==null)cv=Infinity;
    return (av-cv)*sortDir;
  });
  const rows=d.map((r,i)=>{
    const cap = r.min!=null ? (r.min*(1-profit-fee)*rate) : null;
    const pf  = r.min!=null ? (r.min*profit) : null;
    const cell=(v,plat,key)=> v==null?'<td class="na">—</td>':
      `<td class="${r.plat===key?'best':''}">${fmt(v)}</td>`;
    return `<tr>
      <td>${i+1}</td>
      <td class="srv">${r.srv}</td>
      ${cell(r.mp,'itemmania','m')}
      ${cell(r.bp,'itembay','b')}
      ${cell(r.tp,'barotem','t')}
      <td class="best">${fmt(r.min)}${r.plat?`<span class="tag ${r.plat}">${tagName[r.plat]}</span>`:''}</td>
      <td class="muted">${fmt(r.med)}</td>
      <td class="muted">${r.n}</td>
      <td class="cap">${cap==null?'—':cap.toFixed(2)}</td>
      <td class="profit">${pf==null?'—':fmt(Math.round(pf))}</td>
    </tr>`;
  }).join("");
  document.getElementById('rows').innerHTML=rows;

  const valid=DATA.filter(r=>r.min!=null);
  const cheapest=[...valid].sort((a,c)=>a.min-c.min)[0];
  document.getElementById('foot').innerHTML=
    `覆盖服务器 <b>${valid.length}</b> 个 · 全站最低 <b style="color:var(--green)">${fmt(cheapest.min)}</b> 韩元/万(${cheapest.srv} · ${tagName[cheapest.plat]})`+
    `<br>收购上限 = 全站最低 × (1 − 利润率 − 平台费) × 汇率 ; 利润 = 全站最低 × 利润率`+
    `<br>公开看板:<a href="https://dyeyu8088-art.github.io/aden/" style="color:var(--blue)">https://dyeyu8088-art.github.io/aden/</a>`;
}

document.getElementById('scraped').textContent=SCRAPED;
['in-profit','in-fee','in-rate'].forEach(id=>document.getElementById(id).addEventListener('input',render));
document.querySelectorAll('#board th').forEach(th=>th.addEventListener('click',()=>{
  const k=th.dataset.k; if(k==="rank")return;
  if(sortKey===k)sortDir*=-1; else{sortKey=k;sortDir=1;}
  render();
}));
document.getElementById('in-rate').value=RATE_DEFAULT;
render();
</script>
</body>
</html>

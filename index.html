<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天堂经典 · 阿登/阿德纳 三平台行情看板</title>
<style>
  :root{--bg:#0f1216;--card:#181d24;--line:#262e38;--txt:#e7edf3;--mut:#8b97a6;--acc:#ffb020;--grn:#39d98a;--blu:#4aa8ff;--pur:#b18cff;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:"Segoe UI","Malgun Gothic",system-ui,sans-serif;font-size:14px;}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 16px 60px;}
  h1{font-size:20px;margin:0 0 4px;}
  .sub{color:var(--mut);font-size:13px;margin-bottom:16px;}
  .sub b{color:var(--acc);}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:18px;align-items:flex-end;}
  .fld{display:flex;flex-direction:column;gap:4px;}
  .fld label{font-size:12px;color:var(--mut);}
  .fld input{width:110px;background:#0f1216;border:1px solid var(--line);border-radius:7px;color:var(--txt);padding:7px 9px;font-size:14px;}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--mut);margin-left:auto;}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle;}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  th,td{padding:9px 8px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap;}
  th{background:#11161c;color:var(--mut);font-weight:600;font-size:12px;cursor:pointer;position:sticky;top:0;}
  th:nth-child(2),td:nth-child(2){text-align:left;}
  th:first-child,td:first-child{text-align:center;color:var(--mut);}
  tbody tr:hover{background:#1d242d;}
  .srv{font-weight:600;}
  .best{font-weight:700;color:var(--grn);}
  .tag{font-size:11px;padding:1px 6px;border-radius:5px;margin-left:6px;vertical-align:middle;}
  .t-m{background:rgba(255,176,32,.16);color:var(--acc);}
  .t-b{background:rgba(74,168,255,.16);color:var(--blu);}
  .t-r{background:rgba(177,140,255,.16);color:var(--pur);}
  .cap{color:var(--grn);font-weight:600;}
  .prof{color:var(--acc);}
  .na{color:#4a5563;}
  .foot{color:var(--mut);font-size:12px;margin-top:14px;line-height:1.7;}
  @media(max-width:720px){.legend{margin-left:0;}th,td{padding:7px 5px;font-size:12px;}}
</style>
</head>
<body>
<div class="wrap">
  <h1>天堂经典 · 阿登/阿德纳 三平台行情看板</h1>
  <div class="sub">数据时点 <b id="scraped"></b> · 抓取 itemmania / itembay / barotem 「리니지클래식 아데나」卖价,按服务器取各平台最低价比价。<b>仅供参考,只读不下单。</b></div>

  <div class="panel">
    <div class="fld"><label>利润率 %</label><input id="inProfit" type="number" value="10" step="0.5"></div>
    <div class="fld"><label>平台费 %</label><input id="inFee" type="number" value="5" step="0.5"></div>
    <div class="fld"><label>汇率 (元/韩元)</label><input id="inRate" type="number" step="0.0001"></div>
    <div class="legend">
      <span><span class="dot" style="background:var(--acc)"></span>itemmania</span>
      <span><span class="dot" style="background:var(--blu)"></span>itembay</span>
      <span><span class="dot" style="background:var(--pur)"></span>barotem</span>
    </div>
  </div>

  <table id="tbl">
    <thead><tr>
      <th data-k="0">#</th>
      <th data-k="srv">服务器</th>
      <th data-k="m">itemmania</th>
      <th data-k="b">itembay</th>
      <th data-k="r">barotem</th>
      <th data-k="min">全站最低</th>
      <th data-k="med">中位价</th>
      <th data-k="n">样本数</th>
      <th data-k="cap">收购上限<br>(元/万)</th>
      <th data-k="prof">利润<br>(韩元/万)</th>
    </tr></thead>
    <tbody id="body"></tbody>
  </table>

  <div class="foot" id="foot"></div>
</div>

<script>
/* ===== 5 个数据常量(由刷新任务更新) ===== */
const SCRAPED = "2026. 06. 19. 오후 06:17";
const RATE_DEFAULT = 0.0046;
const MANIA = [["아인하사드",668,720,1150,32],["로엔그린",670,729,1500,14],["아스테어",700,718,820,9],["캐스톨",800,910,910,2],["아툰",800,860,890,4],["데컨",800,880,2000,5],["듀크데필",810,820,880,4],["발센",870,880,880,4],["케레니스",880,1000,2500,8],["어레인",880,880,1030,3],["마프르",880,880,880,1],["가드리아",900,900,990,3],["파아그리오",930,930,930,1],["에바",940,1020,1063,4],["린델",950,1000,1020,3],["세바스챤",960,1380,2500,3],["사이하",980,980,980,1],["크리스터",990,1050,2500,3],["하이네",1010,1060,1541,3],["켄라우헬",1020,1180,2500,3],["군터",1040,1060,1070,3],["오웬",1050,1100,1170,6],["하딘",1060,1070,1070,2],["조우",1180,1330,1350,3],["이실로테",1180,1310,1310,2],["질리언",1270,1790,1790,2],["발라카스",1350,1430,4530,5],["데포로쥬",1640,1640,1640,1],["오렌",2690,2790,2790,2]];
const IBAY = [["아인하사드",720,730,1150,11],["로엔그린",730,750,1020,13],["아스테어",750,760,1080,10],["아툰",780,850,860,10],["캐스톨",800,900,1225,15],["듀크데필",810,830,880,12],["마프르",820,870,1250,10],["데컨",820,870,900,11],["발센",880,910,990,12],["어레인",880,1010,1110,13],["케레니스",880,920,940,11],["파아그리오",900,930,1180,13],["가드리아",900,910,990,13],["에바",940,980,1230,15],["세바스챤",950,970,990,9],["사이하",970,990,1380,10],["린델",1000,1000,1020,12],["하이네",1000,1010,1120,12],["하딘",1010,1030,1060,9],["켄라우헬",1020,1110,1200,11],["크리스터",1040,1040,1070,9],["군터",1050,1070,1380,11],["오웬",1080,1160,1180,12],["조우",1143,1180,1800,15],["이실로테",1180,1240,1320,11],["발라카스",1410,1480,1540,10],["질리언",1420,1500,1600,8],["데포로쥬",1520,1650,2900,12],["오렌",2690,2730,2800,8]];
const BARO = [["로엔그린",649,750,1000,10],["아인하사드",668,730,800,15],["아스테어",720,730,820,7],["데컨",790,820,870,12],["아툰",800,825,880,10],["듀크데필",801,820,870,13],["마프르",810,840,880,10],["캐스톨",840,860,930,10],["발센",860,900,990,12],["케레니스",877,900,1018,15],["가드리아",879,900,2490,13],["세바스챤",900,920,990,10],["사이하",900,960,1020,15],["에바",901,960,980,10],["하딘",910,1000,1304,14],["파아그리오",910,920,970,9],["린델",930,980,1030,15],["어레인",934,1000,1090,10],["크리스터",980,1000,1060,12],["하이네",980,1020,1100,13],["군터",999,1050,1120,9],["켄라우헬",1090,1100,1500,11],["오웬",1100,1130,1150,17],["조우",1148,1220,1330,18],["이실로테",1180,1240,1500,15],["질리언",1290,1430,1600,12],["발라카스",1350,1400,1500,11],["데포로쥬",1490,1570,1700,14],["오렌",2500,2670,2800,10]];

/* ===== 渲染逻辑 ===== */
const SERVER_ORDER=["데포로쥬","켄라우헬","질리언","이실로테","조우","하딘","케레니스","오웬","크리스터","아인하사드","아툰","가드리아","군터","아스테어","듀크데필","발센","어레인","캐스톨","세바스챤","데컨","파아그리오","에바","사이하","마프르","린델","하이네","로엔그린","발라카스","오렌"];
const mapOf=a=>{const m={};a.forEach(r=>m[r[0]]=r);return m;};
const M=mapOf(MANIA),B=mapOf(IBAY),R=mapOf(BARO);
const median=arr=>{const x=[...arr].sort((p,q)=>p-q);const n=x.length;return n?(n%2?x[(n-1)/2]:Math.round((x[n/2-1]+x[n/2])/2)):null;};
const fmt=v=>v==null?'<span class="na">—</span>':v.toLocaleString();

let rows=SERVER_ORDER.map(s=>{
  const m=M[s],b=B[s],r=R[s];
  const mins=[];if(m)mins.push(['m',m[1]]);if(b)mins.push(['b',b[1]]);if(r)mins.push(['r',r[1]]);
  if(!mins.length)return null;
  mins.sort((x,y)=>x[1]-y[1]);
  const best=mins[0];
  const meds=[];if(m)meds.push(m[2]);if(b)meds.push(b[2]);if(r)meds.push(r[2]);
  const n=(m?m[4]:0)+(b?b[4]:0)+(r?r[4]:0);
  return {srv:s,m:m?m[1]:null,b:b?b[1]:null,r:r?r[1]:null,min:best[1],plat:best[0],med:median(meds),n};
}).filter(Boolean);

let sortK='min',sortAsc=true;

function render(){
  const profit=(+document.getElementById('inProfit').value||0)/100;
  const fee=(+document.getElementById('inFee').value||0)/100;
  const rate=+document.getElementById('inRate').value||RATE_DEFAULT;
  const TAG={m:'t-m',b:'t-b',r:'t-r'},NM={m:'mania',b:'bay',r:'baro'};
  let data=rows.map(o=>({...o,cap:o.min*(1-profit-fee)*rate,prof:o.min*profit}));
  data.sort((a,b)=>{let x=a[sortK],y=b[sortK];if(sortK==='srv'){return sortAsc?(''+x).localeCompare(y):(''+y).localeCompare(x);}return sortAsc?x-y:y-x;});
  const body=document.getElementById('body');body.innerHTML='';
  data.forEach((o,i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${i+1}</td>`
      +`<td class="srv">${o.srv}</td>`
      +`<td>${fmt(o.m)}</td><td>${fmt(o.b)}</td><td>${fmt(o.r)}</td>`
      +`<td class="best">${o.min.toLocaleString()}<span class="tag ${TAG[o.plat]}">${NM[o.plat]}</span></td>`
      +`<td>${fmt(o.med)}</td><td>${o.n}</td>`
      +`<td class="cap">${o.cap.toFixed(3)}</td>`
      +`<td class="prof">${Math.round(o.prof).toLocaleString()}</td>`;
    body.appendChild(tr);
  });
  const gm=Math.min(...rows.filter(o=>o.m!=null).map(o=>o.m));
  const gb=Math.min(...rows.filter(o=>o.b!=null).map(o=>o.b));
  const gr=Math.min(...rows.filter(o=>o.r!=null).map(o=>o.r));
  const ov=Math.min(gm,gb,gr);
  const cheap=ov===gr?'barotem':ov===gm?'itemmania':'itembay';
  document.getElementById('foot').innerHTML=
    `三平台全站最低:itemmania <b>${gm}</b> · itembay <b>${gb}</b> · barotem <b>${gr}</b> 원/만 &nbsp;|&nbsp; 最便宜平台:<b>${cheap}</b> &nbsp;|&nbsp; 覆盖 ${rows.length} 区<br>`
    +`收购上限 = 全站最低 ×(1 − 利润率 − 平台费)× 汇率;利润 = 全站最低 × 利润率。价格单位:韩元/万阿登。`;
}

document.getElementById('scraped').textContent=SCRAPED;
document.getElementById('inRate').value=RATE_DEFAULT;
['inProfit','inFee','inRate'].forEach(id=>document.getElementById(id).addEventListener('input',render));
document.querySelectorAll('#tbl th').forEach(th=>th.addEventListener('click',()=>{const k=th.dataset.k;if(k==='0')return;if(sortK===k)sortAsc=!sortAsc;else{sortK=k;sortAsc=true;}render();}));
render();
</script>
</body>
</html>
